name: AI Radar Daily Digest

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch, Summarise & Send
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          BREVO_LOGIN:      ${{ secrets.BREVO_LOGIN }}
          BREVO_SMTP_KEY:   ${{ secrets.BREVO_SMTP_KEY }}
          BREVO_SENDER:     ${{ secrets.BREVO_SENDER }}
          BREVO_RECIPIENT:  ${{ secrets.BREVO_RECIPIENT }}
        run: python main.py
