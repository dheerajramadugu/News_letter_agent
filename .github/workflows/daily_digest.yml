name: AI Radar Daily Digest

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch, Summarise & Send
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          BREVO_SMTP_HOST:    ${{ secrets.BREVO_SMTP_HOST }}
          BREVO_SMTP_PORT:    ${{ secrets.BREVO_SMTP_PORT }}
          BREVO_SENDER_EMAIL: ${{ secrets.BREVO_SENDER_EMAIL }}
          BREVO_SMTP_KEY:     ${{ secrets.BREVO_SMTP_KEY }}
          GMAIL_RECIPIENT:    ${{ secrets.GMAIL_RECIPIENT }}
        run: python main.py
